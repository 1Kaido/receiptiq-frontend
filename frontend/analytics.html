<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReceiptIQ - AI Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/frontend/css/analytics.css">
</head>
<body>

  <header class="top-bar">
    <button id="backBtn" class="icon-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h2>AI Expense Analysis</h2>
    <div class="header-badge">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
    </div>
  </header>

  <main>

    <button id="analyzeBtn" class="analyze-btn">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      Generate AI Insights
    </button>

    <!-- Hidden until data loads -->
    <div id="aiResponse" class="hidden">

      <!-- Summary + Personality -->
      <div class="card summary-card">
        <div class="summary-top">
          <div class="personality-badge" id="personalityBadge">
            <i class="fa-solid fa-user-astronaut"></i>
            <span id="spendingPersonality">—</span>
          </div>
          <div class="score-circle" id="scoreCircle">
            <span id="scoreValue">—</span>
            <small id="scoreLabel">—</small>
          </div>
        </div>
        <p class="summary-line" id="summaryLine">—</p>
        <p class="score-reason" id="scoreReason">—</p>
      </div>

      <!-- Insights -->
      <div class="section-title">
        <i class="fa-solid fa-lightbulb"></i> Key Insights
      </div>
      <div class="card" id="insightsCard">
        <ul class="insight-list" id="insightsList"></ul>
      </div>

      <!-- Warnings -->
      <div class="section-title warning-title">
        <i class="fa-solid fa-triangle-exclamation"></i> Warnings
      </div>
      <div class="card warning-card" id="warningsCard">
        <ul class="warning-list" id="warningsList"></ul>
      </div>

      <!-- Tip of the Day -->
      <div class="section-title">
        <i class="fa-solid fa-star"></i> Tip of the Day
      </div>
      <div class="card tip-card">
        <i class="fa-solid fa-circle-check tip-icon"></i>
        <p id="tipOfDay">—</p>
      </div>

      <!-- Detailed Advice -->
      <div class="section-title">
        <i class="fa-solid fa-chart-pie"></i> Category Advice
      </div>
      <div id="detailedAdvice"></div>

      <!-- Monthly Forecast -->
      <div class="section-title">
        <i class="fa-solid fa-calendar-days"></i> Monthly Forecast
      </div>
      <div class="card forecast-card">
        <i class="fa-solid fa-arrow-trend-up forecast-icon"></i>
        <p id="monthlyForecast">—</p>
      </div>

    </div>

  </main>

  <script type="module" src="/frontend/js/analytics.js"></script>
</body>
</html>
