<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReceiptIQ - Receipts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./css/receipts.css">
</head>
<body>

  <header class="top-bar">
    <button id="backBtn" class="icon-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h2>All Receipts</h2>
    <div class="receipt-count-badge" id="receiptCount"></div>
  </header>

  <!-- LOADER -->
  <div id="loader" class="loader-wrap">
    <div class="skeleton-card" style="height:180px"></div>
    <div class="skeleton-card" style="height:180px"></div>
    <div class="skeleton-card" style="height:180px"></div>
  </div>

  <div id="receiptContainer"></div>

  <script type="module" src="./js/receipts.js"></script>
</body>
</html>
